<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EVE Frontier Hackathon Analytics</title>
  <meta name="description" content="Data analysis of 123 submissions to the EVE Frontier DeepSurge Hackathon — geographic breakdown, flag analysis, coverage gaps, and submitter patterns." />
  <meta property="og:title" content="EVE Frontier Hackathon Analytics" />
  <meta property="og:description" content="123 submissions · 25 countries · 94 unique builders. Deep dive into the EVE Frontier DeepSurge Hackathon." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.15.0/Recharts.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body { background: #0a0e17; color: #e2e8f0; font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0a0e17; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const {
      BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer,
      Treemap, RadarChart, Radar, PolarGrid, PolarAngleAxis, PolarRadiusAxis,
      Cell, CartesianGrid, ReferenceLine
    } = Recharts;

    const C = {
      bg: "#0a0e17", card: "#111827", cardBorder: "#1e293b",
      accent: "#f59e0b", accentDim: "#92400e",
      danger: "#ef4444", dangerDim: "#991b1b",
      success: "#10b981", muted: "#64748b",
      text: "#e2e8f0", textDim: "#94a3b8",
      blue: "#3b82f6", purple: "#8b5cf6", cyan: "#06b6d4",
      orange: "#f97316", pink: "#ec4899", lime: "#84cc16",
    };

    const TCOLORS = ["#f59e0b","#3b82f6","#10b981","#ef4444","#8b5cf6","#06b6d4","#f97316","#ec4899","#84cc16"];

    // ── Data ──
    const flagRateData = [
      { country:"Vietnam", flagged:75, total:4 },
      { country:"Australia", flagged:50, total:2 },
      { country:"US", flagged:30.4, total:23 },
      { country:"Spain", flagged:25, total:4 },
      { country:"Germany", flagged:25, total:4 },
      { country:"UK", flagged:25, total:8 },
      { country:"China", flagged:22.7, total:22 },
      { country:"Taiwan", flagged:0, total:5 },
      { country:"Nigeria", flagged:0, total:4 },
      { country:"India", flagged:0, total:3 },
    ];

    const categoryFlagData = [
      { category:"Devtools", flagRate:60, total:5 },
      { category:"Mini-game", flagRate:28.6, total:7 },
      { category:"Community", flagRate:24, total:25 },
      { category:"Trading", flagRate:25, total:8 },
      { category:"Media", flagRate:25, total:4 },
      { category:"Data", flagRate:15.4, total:26 },
      { category:"Finance", flagRate:12.5, total:16 },
      { category:"Bounty", flagRate:16.7, total:12 },
      { category:"Utility", flagRate:20, total:5 },
      { category:"Pred. Market", flagRate:0, total:3 },
    ];

    const treemapData = [
      { name:"Data", size:26, color:0 },
      { name:"Community", size:25, color:1 },
      { name:"Finance", size:16, color:2 },
      { name:"Bounty", size:12, color:3 },
      { name:"Trading", size:8, color:4 },
      { name:"Mini-game", size:7, color:5 },
      { name:"Utility", size:6, color:6 },
      { name:"Devtools", size:5, color:7 },
      { name:"Media", size:4, color:8 },
      { name:"Pred. Market", size:3, color:0 },
      { name:"Education", size:2, color:1 },
      { name:"Other", size:8, color:4 },
    ];

    const gapData = [
      { area:"Data dashboards", coverage:29 },
      { area:"Bounty/tasks", coverage:13 },
      { area:"Insurance", coverage:6 },
      { area:"Gates/tolls", coverage:6 },
      { area:"Prediction mkts", coverage:3 },
      { area:"Governance", coverage:2 },
      { area:"Onboarding", coverage:2 },
      { area:"Comms/chat", coverage:1 },
      { area:"Fleet mgmt", coverage:1 },
      { area:"Oracles", coverage:1 },
      { area:"Escrow/dispute", coverage:1 },
      { area:"Lending", coverage:0 },
      { area:"Cross-chain", coverage:0 },
    ];

    const radarData = [
      { area:"Data", value:95 }, { area:"Bounty", value:65 },
      { area:"Insurance", value:40 }, { area:"Trading", value:50 },
      { area:"Comms", value:5 }, { area:"Fleet Mgmt", value:5 },
      { area:"Lending", value:0 }, { area:"Governance", value:15 },
      { area:"Oracles", value:5 }, { area:"Onboarding", value:12 },
    ];

    const repeatSubmitters = [
      { name:"Ramon Liao", count:6, flagged:0 },
      { name:"Econmartin", count:3, flagged:0 },
      { name:"Michael Davis", count:3, flagged:0 },
      { name:"notadvice42", count:2, flagged:0 },
      { name:"Scetrov", count:2, flagged:1 },
      { name:"Q.C. Vo", count:2, flagged:2 },
    ];

    const geoData = [
      { country:"US", count:23 }, { country:"China", count:22 },
      { country:"Unknown", count:13 }, { country:"UK", count:8 },
      { country:"Taiwan", count:5 }, { country:"Spain", count:4 },
      { country:"Vietnam", count:4 }, { country:"Nigeria", count:4 },
      { country:"Germany", count:4 }, { country:"India", count:3 },
      { country:"Others (13)", count:16 },
    ];

    const notEveEntries = [
      { title:"ChainDash", user:"Ted", country:"UK", hasUrl:true, ghost:false },
      { title:"nova aces", user:"Jesse Lewis", country:"—", hasUrl:true, ghost:false },
      { title:"The Ministry of Passage", user:"Craig Greenway", country:"UK", hasUrl:true, ghost:false },
      { title:"Vandals", user:"Brian Metras", country:"US", hasUrl:false, ghost:true },
      { title:"SawerSui", user:"—", country:"—", hasUrl:false, ghost:true },
      { title:"onlychins", user:"—", country:"—", hasUrl:false, ghost:true },
    ];

    const gapCallouts = [
      { area:"Lending", icon:"\u{1F4B0}", desc:"Zero credit markets in a game with tradeable assets and fuel costs" },
      { area:"Cross-chain", icon:"\u{1F517}", desc:"Everything on Sui \u2014 no interoperability with other chains" },
      { area:"Comms", icon:"\u{1F4AC}", desc:"1 chat tool for a multiplayer space game where coordination is everything" },
      { area:"Fleet Mgmt", icon:"\u{1F680}", desc:"More insurance protocols (6) than tools to manage the ships (1)" },
      { area:"Oracles", icon:"\u{1F4E1}", desc:"29 dashboards reading data, 1 oracle writing it on-chain" },
      { area:"Escrow", icon:"\u2696\uFE0F", desc:"Lots of bounty boards, almost no dispute resolution" },
    ];

    const wordCloud = [
      { word:"Frontier", count:44, size:22 }, { word:"EVE", count:17, size:18 },
      { word:"Protocol", count:8, size:15 }, { word:"Network", count:7, size:14 },
      { word:"Bounty", count:5, size:13 }, { word:"Exchange", count:4, size:12 },
      { word:"Hub", count:4, size:12 }, { word:"Insurance", count:4, size:12 },
      { word:"Board", count:3, size:11 }, { word:"Sentinel", count:3, size:11 },
      { word:"Nexus", count:3, size:11 }, { word:"Dead", count:3, size:11 },
      { word:"Toolkit", count:3, size:11 }, { word:"Trade", count:3, size:11 },
      { word:"Manager", count:3, size:11 }, { word:"Alliance", count:2, size:10 },
      { word:"Intel", count:2, size:10 }, { word:"Defense", count:2, size:10 },
      { word:"Rift", count:2, size:10 }, { word:"Contract", count:2, size:10 },
    ];

    // ── Components ──
    const CustomTooltip = ({ active, payload, label, suffix="" }) => {
      if (!active || !payload?.length) return null;
      return (
        <div style={{ background:"#1e293b", border:"1px solid #334155", borderRadius:6, padding:"8px 12px", fontSize:12 }}>
          <p style={{ color:C.text, margin:0, fontWeight:600 }}>{label}</p>
          {payload.map((p,i) => (
            <p key={i} style={{ color:p.color||C.accent, margin:"2px 0 0", fontSize:11 }}>
              {p.name}: {p.value}{suffix}
            </p>
          ))}
        </div>
      );
    };

    const TreemapContent = ({ x, y, width, height, name, size }) => {
      if (width < 40 || height < 30) return null;
      return (
        <g>
          <text x={x+width/2} y={y+height/2-6} textAnchor="middle" fill="#fff"
            fontSize={width<70?10:13} fontWeight={700} fontFamily="'DM Sans',sans-serif">{name}</text>
          <text x={x+width/2} y={y+height/2+12} textAnchor="middle" fill="rgba(255,255,255,0.6)"
            fontSize={width<70?9:11} fontFamily="'DM Sans',sans-serif">{size}</text>
        </g>
      );
    };

    const Section = ({ title, sub, children }) => (
      <div style={{ marginBottom:16 }}>
        <h2 style={{ fontFamily:"'Space Mono',monospace", fontSize:15, fontWeight:700, color:C.accent,
          margin:0, letterSpacing:"0.08em", textTransform:"uppercase" }}>{title}</h2>
        {sub && <p style={{ fontFamily:"'DM Sans',sans-serif", fontSize:12, color:C.textDim,
          margin:"4px 0 0", lineHeight:1.5 }}>{sub}</p>}
        {children}
      </div>
    );

    const Stat = ({ label, value, sub, color=C.accent }) => (
      <div style={{ background:C.card, border:`1px solid ${C.cardBorder}`, borderRadius:10, padding:"16px 20px", flex:1, minWidth:140 }}>
        <div style={{ fontFamily:"'Space Mono',monospace", fontSize:28, fontWeight:700, color, lineHeight:1 }}>{value}</div>
        <div style={{ fontSize:12, color:C.textDim, marginTop:4 }}>{label}</div>
        {sub && <div style={{ fontSize:11, color:C.muted, marginTop:2 }}>{sub}</div>}
      </div>
    );

    const Card = ({ children, style={} }) => (
      <div style={{ background:C.card, border:`1px solid ${C.cardBorder}`, borderRadius:12, padding:24, ...style }}>{children}</div>
    );

    const Legend2 = ({ items }) => (
      <div style={{ display:"flex", gap:16, marginTop:12, flexWrap:"wrap" }}>
        {items.map(l => (
          <div key={l.label} style={{ display:"flex", alignItems:"center", gap:6 }}>
            <div style={{ width:10, height:10, borderRadius:2, background:l.color }} />
            <span style={{ fontSize:10, color:C.muted, fontFamily:"'Space Mono',monospace" }}>{l.label}</span>
          </div>
        ))}
      </div>
    );

    const flagColor = v => v >= 50 ? C.danger : v >= 25 ? C.orange : v > 0 ? C.accent : C.success;
    const gapColor = v => v === 0 ? C.danger : v <= 2 ? C.orange : v <= 6 ? C.accent : C.success;

    const tabs = [
      { id:"overview", label:"Overview" },
      { id:"flags", label:"Flag Analysis" },
      { id:"gaps", label:"Coverage Gaps" },
      { id:"submitters", label:"Submitters" },
    ];

    // ── Main App ──
    function App() {
      const [tab, setTab] = useState("overview");
      const [loaded, setLoaded] = useState(false);
      useEffect(() => { setTimeout(() => setLoaded(true), 100); }, []);

      return (
        <div style={{ maxWidth:860, margin:"0 auto", padding:"32px 20px",
          opacity:loaded?1:0, transform:loaded?"translateY(0)":"translateY(12px)",
          transition:"opacity 0.5s ease, transform 0.5s ease" }}>

          {/* Header */}
          <header style={{ marginBottom:28 }}>
            <div style={{ fontFamily:"'Space Mono',monospace", fontSize:10, color:C.accent,
              letterSpacing:"0.15em", textTransform:"uppercase", marginBottom:4 }}>HACKATHON ANALYTICS</div>
            <h1 style={{ fontFamily:"'Space Mono',monospace", fontSize:24, fontWeight:700,
              color:C.text, margin:0, lineHeight:1.3 }}>EVE Frontier &middot; DeepSurge</h1>
            <p style={{ fontSize:13, color:C.textDim, margin:"6px 0 0" }}>
              123 submissions &middot; 25 countries &middot; 94 unique builders
            </p>
          </header>

          {/* Tabs */}
          <nav style={{ display:"flex", gap:4, marginBottom:24, borderBottom:`1px solid ${C.cardBorder}`, overflowX:"auto" }}>
            {tabs.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{
                fontFamily:"'Space Mono',monospace", fontSize:11,
                fontWeight:tab===t.id?700:400,
                color:tab===t.id?C.accent:C.muted,
                background:tab===t.id?C.accentDim+"33":"transparent",
                border:"none",
                borderBottom:tab===t.id?`2px solid ${C.accent}`:"2px solid transparent",
                padding:"10px 16px", cursor:"pointer",
                letterSpacing:"0.04em", textTransform:"uppercase",
                whiteSpace:"nowrap", transition:"all 0.15s",
              }}>{t.label}</button>
            ))}
          </nav>

          {/* ═══ OVERVIEW ═══ */}
          {tab === "overview" && (
            <div style={{ display:"flex", flexDirection:"column", gap:20 }}>
              <div style={{ display:"flex", gap:12, flexWrap:"wrap" }}>
                <Stat label="Total Entries" value="123" />
                <Stat label="Flagged" value="31" sub="25.2%" color={C.danger} />
                <Stat label="Countries" value="25" color={C.blue} />
                <Stat label="Solo" value="88%" sub="108 of 123" color={C.success} />
              </div>

              <Card>
                <Section title="Category Landscape"
                  sub="Data, Community and Finance dominate — 68% of all entries fall into three broad themes" />
                <ResponsiveContainer width="100%" height={280}>
                  <Treemap data={treemapData} dataKey="size" nameKey="name" content={<TreemapContent />}>
                    {treemapData.map((e,i) => <Cell key={i} fill={TCOLORS[e.color]} stroke={C.bg} strokeWidth={2} />)}
                  </Treemap>
                </ResponsiveContainer>
              </Card>

              <Card>
                <Section title="Geographic Distribution"
                  sub="US and China nearly tied, together making up a third of all entries. Long tail of 22 other countries." />
                <ResponsiveContainer width="100%" height={300}>
                  <BarChart data={geoData} layout="vertical" margin={{ left:10, right:20, top:5, bottom:5 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" horizontal={false} />
                    <XAxis type="number" tick={{ fill:C.muted, fontSize:10, fontFamily:"'Space Mono',monospace" }} />
                    <YAxis type="category" dataKey="country" width={85}
                      tick={{ fill:C.textDim, fontSize:11, fontFamily:"'DM Sans',sans-serif" }} />
                    <Tooltip content={<CustomTooltip />} />
                    <Bar dataKey="count" name="Entries" radius={[0,4,4,0]}>
                      {geoData.map((e,i) => <Cell key={i} fill={
                        e.country==="US"?C.blue : e.country==="China"?C.danger :
                        e.country==="Unknown"?C.muted : e.country==="UK"?C.cyan : C.accent
                      } />)}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
              </Card>
            </div>
          )}

          {/* ═══ FLAGS ═══ */}
          {tab === "flags" && (
            <div style={{ display:"flex", flexDirection:"column", gap:20 }}>
              <Card>
                <Section title="Flag Rate by Country"
                  sub="Vietnam's 75% flag rate far exceeds the 25% average. Only countries with 2+ entries shown." />
                <ResponsiveContainer width="100%" height={320}>
                  <BarChart data={flagRateData} margin={{ left:10, right:20, top:15, bottom:5 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" vertical={false} />
                    <XAxis dataKey="country" tick={{ fill:C.textDim, fontSize:10, fontFamily:"'DM Sans',sans-serif" }}
                      interval={0} angle={-30} textAnchor="end" height={60} />
                    <YAxis tick={{ fill:C.muted, fontSize:10, fontFamily:"'Space Mono',monospace" }}
                      domain={[0,100]} tickFormatter={v=>`${v}%`} />
                    <Tooltip content={<CustomTooltip suffix="%" />} />
                    <ReferenceLine y={25.2} stroke={C.accent} strokeDasharray="6 4" strokeWidth={1.5}
                      label={{ value:"Avg 25.2%", fill:C.accent, fontSize:10, fontFamily:"'Space Mono',monospace", position:"right" }} />
                    <Bar dataKey="flagged" name="Flag rate" radius={[4,4,0,0]}>
                      {flagRateData.map((e,i) => <Cell key={i} fill={flagColor(e.flagged)} />)}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
                <Legend2 items={[
                  { color:C.danger, label:"\u226550%" }, { color:C.orange, label:"\u226525%" },
                  { color:C.accent, label:"<25%" }, { color:C.success, label:"0%" },
                ]} />
              </Card>

              <Card>
                <Section title="Flag Rate by Category"
                  sub="Devtools' 60% flag rate is more than double the average. Data and Finance were the cleanest." />
                <ResponsiveContainer width="100%" height={300}>
                  <BarChart data={categoryFlagData} layout="vertical" margin={{ left:10, right:20, top:5, bottom:5 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" horizontal={false} />
                    <XAxis type="number" domain={[0,70]}
                      tick={{ fill:C.muted, fontSize:10, fontFamily:"'Space Mono',monospace" }}
                      tickFormatter={v=>`${v}%`} />
                    <YAxis type="category" dataKey="category" width={90}
                      tick={{ fill:C.textDim, fontSize:11, fontFamily:"'DM Sans',sans-serif" }} />
                    <Tooltip content={<CustomTooltip suffix="%" />} />
                    <ReferenceLine x={25.2} stroke={C.accent} strokeDasharray="6 4" strokeWidth={1.5} />
                    <Bar dataKey="flagRate" name="Flag rate" radius={[0,4,4,0]}>
                      {categoryFlagData.map((e,i) => <Cell key={i} fill={flagColor(e.flagRate)} />)}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
              </Card>

              <Card>
                <Section title="Not EVE Related"
                  sub="6 entries had nothing to do with EVE Frontier. The last 3 are near-empty ghost submissions." />
                <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                  {notEveEntries.map((e,i) => (
                    <div key={i} style={{
                      display:"flex", alignItems:"center", gap:12, padding:"10px 14px",
                      background:e.ghost?C.dangerDim+"22":C.bg, borderRadius:8,
                      border:`1px solid ${e.ghost?C.dangerDim+"44":C.cardBorder}`,
                    }}>
                      <div style={{ width:8, height:8, borderRadius:"50%",
                        background:e.ghost?C.danger:C.orange, flexShrink:0 }} />
                      <div style={{ flex:1, minWidth:0 }}>
                        <span style={{ fontSize:13, fontWeight:600, color:C.text }}>{e.title}</span>
                        <span style={{ fontSize:11, color:C.muted, marginLeft:8 }}>{e.user} &middot; {e.country}</span>
                      </div>
                      <div style={{ display:"flex", gap:6, flexShrink:0 }}>
                        {!e.hasUrl && <span style={{ fontSize:9, color:C.danger, fontFamily:"'Space Mono',monospace",
                          background:C.dangerDim+"33", padding:"2px 6px", borderRadius:4,
                          letterSpacing:"0.05em" }}>NO URL</span>}
                        {e.ghost && <span style={{ fontSize:9, color:C.danger, fontFamily:"'Space Mono',monospace",
                          background:C.dangerDim+"33", padding:"2px 6px", borderRadius:4,
                          letterSpacing:"0.05em" }}>GHOST</span>}
                      </div>
                    </div>
                  ))}
                </div>
              </Card>
            </div>
          )}

          {/* ═══ GAPS ═══ */}
          {tab === "gaps" && (
            <div style={{ display:"flex", flexDirection:"column", gap:20 }}>
              <Card>
                <Section title="Project Coverage"
                  sub="29 data dashboards but zero lending protocols. Builders saturated observation tools and left the coordination layer empty." />
                <ResponsiveContainer width="100%" height={400}>
                  <BarChart data={gapData} layout="vertical" margin={{ left:10, right:20, top:5, bottom:5 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" horizontal={false} />
                    <XAxis type="number" tick={{ fill:C.muted, fontSize:10, fontFamily:"'Space Mono',monospace" }} />
                    <YAxis type="category" dataKey="area" width={110}
                      tick={{ fill:C.textDim, fontSize:11, fontFamily:"'DM Sans',sans-serif" }} />
                    <Tooltip content={<CustomTooltip />} />
                    <Bar dataKey="coverage" name="Projects" radius={[0,4,4,0]}>
                      {gapData.map((e,i) => <Cell key={i} fill={gapColor(e.coverage)} />)}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
                <Legend2 items={[
                  { color:C.danger, label:"Zero coverage" }, { color:C.orange, label:"1\u20132 projects" },
                  { color:C.accent, label:"3\u20136 projects" }, { color:C.success, label:"7+ projects" },
                ]} />
              </Card>

              <Card>
                <Section title="Coverage Radar"
                  sub="Normalised coverage showing how saturated each area is. Heavily skewed toward data, almost nothing on coordination." />
                <ResponsiveContainer width="100%" height={350}>
                  <RadarChart data={radarData} outerRadius="75%">
                    <PolarGrid stroke="#1e293b" />
                    <PolarAngleAxis dataKey="area"
                      tick={{ fill:C.textDim, fontSize:10, fontFamily:"'DM Sans',sans-serif" }} />
                    <PolarRadiusAxis angle={90} domain={[0,100]} tick={false} axisLine={false} />
                    <Radar name="Coverage" dataKey="value" stroke={C.accent} fill={C.accent}
                      fillOpacity={0.2} strokeWidth={2} />
                  </RadarChart>
                </ResponsiveContainer>
              </Card>

              <div style={{ display:"flex", gap:12, flexWrap:"wrap" }}>
                {gapCallouts.map(g => (
                  <div key={g.area} style={{
                    background:C.card, border:`1px solid ${C.dangerDim}44`, borderRadius:10,
                    padding:"14px 16px", flex:"1 1 calc(50% - 6px)", minWidth:200,
                  }}>
                    <div style={{ fontSize:18, marginBottom:6 }}>{g.icon}</div>
                    <div style={{ fontFamily:"'Space Mono',monospace", fontSize:12, fontWeight:700,
                      color:C.danger, marginBottom:4 }}>{g.area}</div>
                    <div style={{ fontSize:11, color:C.textDim, lineHeight:1.5 }}>{g.desc}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ═══ SUBMITTERS ═══ */}
          {tab === "submitters" && (
            <div style={{ display:"flex", flexDirection:"column", gap:20 }}>
              <div style={{ display:"flex", gap:12, flexWrap:"wrap" }}>
                <Stat label="Unique Individuals" value="94" color={C.blue} />
                <Stat label="Group Entries (Vx)" value="15" sub="12.2%" color={C.purple} />
                <Stat label="Repeat Submitters" value="6" sub="18 entries total" color={C.orange} />
                <Stat label="Frontier in Title" value="44" sub="35.8%" color={C.cyan} />
              </div>

              <Card>
                <Section title="Repeat Submitters"
                  sub="6 people accounted for 18 of 123 entries. All clean except Quoc Cuong Vo — 100% flag rate." />
                <ResponsiveContainer width="100%" height={220}>
                  <BarChart data={repeatSubmitters} layout="vertical" margin={{ left:10, right:20, top:5, bottom:5 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" horizontal={false} />
                    <XAxis type="number" domain={[0,7]}
                      tick={{ fill:C.muted, fontSize:10, fontFamily:"'Space Mono',monospace" }} />
                    <YAxis type="category" dataKey="name" width={100}
                      tick={{ fill:C.textDim, fontSize:11, fontFamily:"'DM Sans',sans-serif" }} />
                    <Tooltip content={<CustomTooltip />} />
                    <Bar dataKey="count" name="Submissions" radius={[0,4,4,0]}>
                      {repeatSubmitters.map((e,i) => <Cell key={i} fill={e.flagged===e.count?C.danger:C.blue} />)}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
              </Card>

              <Card>
                <Section title="Naming Patterns"
                  sub="Most common words in project titles — 'Protocol' and 'Network' dominate after the game name" />
                <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginTop:4 }}>
                  {wordCloud.map(w => (
                    <span key={w.word} style={{
                      fontFamily:"'Space Mono',monospace", fontSize:w.size,
                      fontWeight:w.count>10?700:400,
                      color:w.count>10?C.accent:w.count>4?C.text:C.textDim,
                      padding:"4px 10px",
                      background:w.count>10?C.accentDim+"22":"transparent",
                      borderRadius:6, lineHeight:1.6,
                    }}>{w.word} <sup style={{ fontSize:9, color:C.muted }}>{w.count}</sup></span>
                  ))}
                </div>
              </Card>

              <Card>
                <Section title="Solo vs Group" />
                <div style={{ display:"flex", height:32, borderRadius:8, overflow:"hidden", marginTop:8 }}>
                  <div style={{ width:"87.8%", background:C.blue, display:"flex", alignItems:"center",
                    justifyContent:"center", fontFamily:"'Space Mono',monospace", fontSize:11,
                    fontWeight:700, color:"#fff" }}>Solo 108 (87.8%)</div>
                  <div style={{ width:"12.2%", background:C.purple, display:"flex", alignItems:"center",
                    justifyContent:"center", fontFamily:"'Space Mono',monospace", fontSize:9,
                    fontWeight:700, color:"#fff" }}>15</div>
                </div>
                <p style={{ fontSize:11, color:C.muted, marginTop:8 }}>
                  Group entries are all "Vx" (various) — mostly pairs (11), with a few teams of 3–5.
                </p>
              </Card>
            </div>
          )}

          {/* Footer */}
          <footer style={{ marginTop:32, paddingTop:16, borderTop:`1px solid ${C.cardBorder}`,
            fontSize:10, color:C.muted, fontFamily:"'Space Mono',monospace", textAlign:"center" }}>
            Data: EVE_hackathon.xlsx &middot; 123 entries &middot; Analysis April 2026
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
